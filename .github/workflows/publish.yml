name: publish

# Intentionally disabled. Releases happen locally through the Python/PyPI flow
# in RELEASE.md until CI publishing, release provenance, and PyPI credential
# ownership are explicitly decided.
#
# Why local, not CI:
# - Keeps PyPI credentials with the maintainer until ownership is settled
# - Avoids a half-configured release path that can publish the wrong artifact
# - Keeps the release operation aligned with RELEASE.md
#
# Why the file still exists:
# - If we choose PyPI Trusted Publishing later, this is the workflow to enable
# - Keeps the disabled release entrypoint visible instead of tribal knowledge
#
# To re-enable: add the PyPI publishing policy, configure Trusted Publishing or
# a secret-backed upload path, and replace the refusal step with the checked
# build/upload sequence from RELEASE.md.

on:
  # Manual-only trigger. Do not add tag-based triggers until the PyPI publish
  # policy and credentials are configured.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Refuse to run until PyPI publishing is wired up
        run: |
          echo "This workflow is intentionally disabled. See the header comment."
          echo "Local publish follows RELEASE.md with uv build and twine."
          exit 1
