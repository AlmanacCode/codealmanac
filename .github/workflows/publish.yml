name: publish

# Tag-triggered npm publish. Push a tag matching `v*` (e.g. v0.1.0) and this
# workflow builds, type-checks, tests, then publishes to npm as `codealmanac`.
# See RELEASE.md for the full release checklist.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    # Least-privilege: we only need to read the repo contents.
    # `id-token: write` is required for npm provenance attestation
    # (`npm publish --provenance`), which signs the build so consumers
    # can verify it was produced by this workflow on this commit.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
